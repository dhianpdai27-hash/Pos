<!doctype html>
<html lang="id">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Universal POS v1.0 - Multi Branch</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js" defer></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Poppins', sans-serif; padding-bottom: 100px; background-color: #f1f5f9; }
    .mono { font-family: 'JetBrains Mono', monospace; }
    .nav-active { color: #4f46e5 !important; border-top: 3px solid #4f46e5; background-color: #f5f3ff; }
    .item-icon-circle { width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; border-radius: 12px; font-weight: 600; color: white; text-transform: uppercase; margin-bottom: 0.5rem; }
    .tab-content { display: none; animation: fadeIn 0.3s ease; }
    .tab-content.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @media print { .no-print { display: none !important; } }
    .scrollbar-hide::-webkit-scrollbar { display: none; }
  </style>
 </head>
 <body>

  <header class="bg-indigo-700 text-white shadow-lg sticky top-0 z-40 px-4 py-3 no-print">
    <div class="flex justify-between items-center max-w-7xl mx-auto">
      <div>
        <h1 id="header-store-name" class="text-sm font-bold tracking-tighter uppercase italic">POS Loading...</h1>
        <p id="header-branch-info" class="text-[10px] text-indigo-100 opacity-80"></p>
      </div>
      <div id="current-date" class="text-[10px] bg-indigo-800 px-3 py-1 rounded-full font-medium"></div>
    </div>
  </header>

  <main class="p-4 max-w-7xl mx-auto">
    
    <div id="content-kasir" class="tab-content active">
      <div class="grid lg:grid-cols-3 gap-6">
        <div class="lg:col-span-2">
          <div id="menu-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3"></div>
        </div>
        <div class="lg:col-span-1">
          <div class="bg-white rounded-2xl shadow-sm p-4 sticky top-20 border border-slate-200">
            <h2 class="font-bold text-slate-800 mb-3 text-xs uppercase tracking-widest flex justify-between">
              <span>Pesanan</span>
              <button onclick="clearCart()" class="text-red-500 text-[10px]">Bersihkan</button>
            </h2>
            <div id="cart-items" class="space-y-2 max-h-[40vh] overflow-y-auto scrollbar-hide mb-4 min-h-[100px]"></div>
            <div class="border-t pt-3 space-y-3">
              <div class="flex justify-between text-xl font-bold text-indigo-700">
                <span>Total</span> <span id="cart-total" class="mono text-2xl">Rp 0</span>
              </div>
              <input type="number" id="payment-input" oninput="calculateChange()" placeholder="Bayar (Rp)" class="w-full px-4 py-3 bg-slate-50 border rounded-xl mono focus:ring-2 focus:ring-indigo-500 outline-none text-xl">
              <div class="flex justify-between text-sm">
                <span class="text-slate-500">Kembalian</span> <span id="change-amount" class="mono font-bold text-green-600">Rp 0</span>
              </div>
              <button onclick="processPayment()" id="btn-pay" disabled class="w-full py-4 bg-indigo-600 text-white rounded-xl font-bold shadow-lg shadow-indigo-200 active:scale-95 transition disabled:opacity-50">PROSES & CETAK</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="content-riwayat" class="tab-content">
      <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
        <div class="p-4 bg-slate-50 border-b flex justify-between items-center">
          <h2 class="font-bold text-slate-800 text-sm uppercase">Riwayat Transaksi</h2>
          <button onclick="exportToExcel()" class="text-[10px] bg-green-600 text-white px-3 py-1 rounded">Excel</button>
        </div>
        <div class="overflow-x-auto">
          <table class="w-full text-left text-xs">
            <thead class="bg-slate-100 text-slate-600 uppercase font-bold">
              <tr>
                <th class="p-3">Waktu / ID</th>
                <th class="p-3">Cabang</th>
                <th class="p-3 text-right">Total</th>
                <th class="p-3 text-center">Aksi</th>
              </tr>
            </thead>
            <tbody id="transaction-table-body" class="divide-y divide-slate-100"></tbody>
          </table>
        </div>
      </div>
    </div>

    <div id="content-keuangan" class="tab-content space-y-4">
      <div class="grid grid-cols-3 gap-3">
        <div class="bg-indigo-600 p-4 rounded-2xl text-white shadow-md">
          <p class="text-[9px] uppercase font-bold opacity-70">Penjualan</p>
          <p id="pnl-revenue" class="text-sm font-bold mono">Rp 0</p>
        </div>
        <div class="bg-rose-500 p-4 rounded-2xl text-white shadow-md">
          <p class="text-[9px] uppercase font-bold opacity-70">Pengeluaran</p>
          <p id="pnl-expense" class="text-sm font-bold mono">Rp 0</p>
        </div>
        <div class="bg-emerald-500 p-4 rounded-2xl text-white shadow-md">
          <p class="text-[9px] uppercase font-bold opacity-70">Laba Bersih</p>
          <p id="pnl-profit" class="text-sm font-bold mono">Rp 0</p>
        </div>
      </div>

      <div class="bg-white rounded-2xl p-5 shadow-sm border border-slate-200">
        <h3 class="font-bold text-slate-800 text-xs uppercase mb-4">Input Biaya Operasional</h3>
        <div class="grid grid-cols-2 gap-3 mb-3">
          <input type="text" id="expense-name" placeholder="Nama Biaya (Gaji, Listrik..)" class="px-4 py-2 bg-slate-50 border rounded-xl text-xs outline-none focus:ring-1 focus:ring-indigo-500">
          <input type="number" id="expense-amount" placeholder="Nominal (Rp)" class="px-4 py-2 bg-slate-50 border rounded-xl text-xs outline-none focus:ring-1 focus:ring-indigo-500">
        </div>
        <button onclick="addExpense()" class="w-full py-3 bg-slate-800 text-white rounded-xl text-xs font-bold active:scale-95 transition">SIMPAN BIAYA</button>
        
        <div class="mt-6 overflow-x-auto">
          <h4 class="text-[10px] font-bold text-slate-400 uppercase mb-2 tracking-widest">Daftar Pengeluaran</h4>
          <table class="w-full text-[11px]">
            <tbody id="expense-table-body" class="divide-y divide-slate-50"></tbody>
          </table>
        </div>
      </div>
    </div>

    <div id="content-menu" class="tab-content space-y-4">
      <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
        <div class="p-4 border-b flex justify-between items-center bg-slate-50">
          <h2 class="font-bold text-sm uppercase">Produk</h2>
          <button onclick="openMenuModal()" class="px-4 py-2 bg-indigo-600 text-white rounded-lg text-[10px] font-bold">+ MENU</button>
        </div>
        <div id="admin-menu-list" class="divide-y divide-slate-100"></div>
      </div>

      <div class="bg-white rounded-2xl p-5 shadow-sm border border-slate-200">
        <h2 class="font-bold text-sm uppercase mb-4">Data & Sinkronisasi</h2>
        <div class="grid grid-cols-2 gap-2">
          <button onclick="exportBackup()" class="p-3 bg-blue-50 text-blue-700 rounded-xl text-[10px] font-bold border border-blue-100">💾 BACKUP JSON</button>
          <label class="p-3 bg-amber-50 text-amber-700 rounded-xl text-[10px] font-bold border border-amber-100 text-center cursor-pointer">
            📂 IMPORT & MERGE <input type="file" id="importFile" class="hidden" onchange="importAndMerge(event)">
          </label>
        </div>
        <button onclick="resetAllData()" class="w-full mt-4 p-3 bg-red-50 text-red-600 rounded-xl text-[10px] font-bold border border-red-100 uppercase">Hapus Semua Data</button>
      </div>
    </div>
  </main>

  <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 shadow-[0_-5px_20px_rgba(0,0,0,0.05)] z-50 no-print">
    <div class="max-w-4xl mx-auto flex justify-around items-center">
      <button onclick="switchTab('kasir')" id="tab-kasir" class="flex flex-col items-center py-4 px-4 transition-all nav-active flex-1">
        <span class="text-xl">🏪</span><span class="text-[9px] font-bold mt-1 uppercase tracking-tighter">Kasir</span>
      </button>
      <button onclick="switchTab('riwayat')" id="tab-riwayat" class="flex flex-col items-center py-4 px-4 text-slate-400 transition-all flex-1">
        <span class="text-xl">📄</span><span class="text-[9px] font-bold mt-1 uppercase tracking-tighter">Riwayat</span>
      </button>
      <button onclick="switchTab('keuangan')" id="tab-keuangan" class="flex flex-col items-center py-4 px-4 text-slate-400 transition-all flex-1">
        <span class="text-xl">📈</span><span class="text-[9px] font-bold mt-1 uppercase tracking-tighter">Laporan</span>
      </button>
      <button onclick="switchTab('menu')" id="tab-menu" class="flex flex-col items-center py-4 px-4 text-slate-400 transition-all flex-1">
        <span class="text-xl">⚙️</span><span class="text-[9px] font-bold mt-1 uppercase tracking-tighter">Kelola</span>
      </button>
      <button onclick="openSettings()" class="flex flex-col items-center py-4 px-4 text-slate-400 flex-1">
        <span class="text-xl">🏢</span><span class="text-[9px] font-bold mt-1 uppercase tracking-tighter">Toko</span>
      </button>
    </div>
  </nav>

  <div id="modal-menu" class="fixed inset-0 bg-black/60 z-[60] hidden flex items-center justify-center p-4">
    <div class="bg-white rounded-3xl w-full max-w-md p-6">
      <h3 id="modal-title" class="font-bold text-lg mb-4">Produk Baru</h3>
      <div class="space-y-4">
        <input type="hidden" id="edit-id">
        <input type="text" id="menu-name" placeholder="Nama Produk" class="w-full px-4 py-3 bg-slate-50 border rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500">
        <input type="number" id="menu-price" placeholder="Harga (Rp)" class="w-full px-4 py-3 bg-slate-50 border rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500">
        <div class="flex items-center gap-4">
          <label class="text-xs font-bold text-slate-500">WARNA IKON</label>
          <input type="color" id="menu-color" class="h-10 w-20 rounded-lg cursor-pointer" value="#6366f1">
        </div>
        <div class="flex gap-3 pt-2">
          <button onclick="closeMenuModal()" class="flex-1 py-3 bg-slate-100 rounded-2xl font-bold text-sm">Batal</button>
          <button onclick="saveMenu()" class="flex-1 py-3 bg-indigo-600 text-white rounded-2xl font-bold text-sm">Simpan</button>
        </div>
      </div>
    </div>
  </div>

  <div id="modal-settings" class="fixed inset-0 bg-black/60 z-[60] hidden flex items-center justify-center p-4">
    <div class="bg-white rounded-3xl w-full max-w-md p-6">
      <h3 class="font-bold text-lg mb-4">Pengaturan Toko</h3>
      <div class="space-y-4">
        <div><label class="text-[10px] font-bold text-slate-400">NAMA TOKO</label><input type="text" id="set-store-name" class="w-full px-4 py-2 border rounded-xl outline-none"></div>
        <div><label class="text-[10px] font-bold text-slate-400">NAMA CABANG (Contoh: Solo, Cabang 1)</label><input type="text" id="set-branch-name" class="w-full px-4 py-2 border rounded-xl outline-none"></div>
        <div><label class="text-[10px] font-bold text-slate-400">ALAMAT & TELP</label><input type="text" id="set-store-address" class="w-full px-4 py-2 border rounded-xl outline-none"></div>
        <div class="flex gap-2">
          <button onclick="closeSettings()" class="flex-1 py-3 bg-slate-100 rounded-xl font-bold text-xs">Tutup</button>
          <button onclick="saveSettings()" class="flex-1 py-3 bg-indigo-600 text-white rounded-xl font-bold text-xs">Simpan</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // --- DATA STATE ---
    let settings = JSON.parse(localStorage.getItem('upos_v1_settings')) || {
      storeName: 'MY STORE',
      branchName: 'PUSAT',
      storeAddress: 'Jl. Utama No. 123 | 08123',
      footer: 'Terima Kasih'
    };

    let menuItems = JSON.parse(localStorage.getItem('upos_v1_menu')) || [
      { id: 1, name: 'Produk Demo', price: 10000, color: '#6366f1' }
    ];

    let transactions = JSON.parse(localStorage.getItem('upos_v1_tx')) || [];
    let expenses = JSON.parse(localStorage.getItem('upos_v1_expenses')) || [];
    let cart = [];

    // --- UTILS ---
    const formatRupiah = (num) => 'Rp ' + Number(num).toLocaleString('id-ID');
    const getInitials = (n) => n.split(' ').map(i => i[0]).join('').toUpperCase().substring(0, 2);

    function switchTab(id) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('nav button').forEach(el => el.classList.remove('nav-active'));
      document.getElementById('content-' + id).classList.add('active');
      document.getElementById('tab-' + id).classList.add('nav-active');
      
      if(id === 'kasir') renderMenuGrid();
      if(id === 'riwayat') renderTransactionTable();
      if(id === 'keuangan') updateFinanceLaporan();
      if(id === 'menu') renderAdminMenu();
    }

    // --- KASIR LOGIC ---
    function renderMenuGrid() {
      const grid = document.getElementById('menu-grid');
      grid.innerHTML = menuItems.map(item => `
        <button onclick="addToCart(${item.id})" class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 text-left active:scale-95 transition">
          <div class="item-icon-circle" style="background-color: ${item.color}">${getInitials(item.name)}</div>
          <p class="font-bold text-slate-800 text-[11px] leading-tight truncate">${item.name}</p>
          <p class="text-indigo-600 font-bold mono text-[10px] mt-1">${formatRupiah(item.price)}</p>
        </button>
      `).join('');
    }

    function addToCart(id) {
      const item = menuItems.find(m => m.id == id);
      const exist = cart.find(c => c.id == id);
      if(exist) exist.qty++; else cart.push({...item, qty: 1});
      renderCart();
    }

    function renderCart() {
      const list = document.getElementById('cart-items');
      if(cart.length === 0) { list.innerHTML = `<div class="py-10 text-center text-[10px] text-slate-400 uppercase tracking-widest">Kosong</div>`; }
      else {
        list.innerHTML = cart.map((item, idx) => `
          <div class="flex justify-between items-center bg-slate-50 p-2 rounded-xl">
            <div class="flex-1"><p class="text-[11px] font-bold">${item.name}</p><p class="text-[9px] text-slate-500">${formatRupiah(item.price)}</p></div>
            <div class="flex items-center gap-2">
              <button onclick="updateQty(${idx}, -1)" class="w-6 h-6 bg-white border rounded font-bold text-xs">-</button>
              <span class="text-xs font-bold w-4 text-center">${item.qty}</span>
              <button onclick="updateQty(${idx}, 1)" class="w-6 h-6 bg-white border rounded font-bold text-xs">+</button>
            </div>
          </div>
        `).join('');
      }
      const total = cart.reduce((s, i) => s + (i.price * i.qty), 0);
      document.getElementById('cart-total').textContent = formatRupiah(total);
      document.getElementById('btn-pay').disabled = total === 0;
      calculateChange();
    }

    function updateQty(idx, d) {
      cart[idx].qty += d;
      if(cart[idx].qty <= 0) cart.splice(idx, 1);
      renderCart();
    }

    function calculateChange() {
      const total = cart.reduce((s, i) => s + (i.price * i.qty), 0);
      const pay = parseInt(document.getElementById('payment-input').value) || 0;
      document.getElementById('change-amount').textContent = formatRupiah(Math.max(0, pay - total));
    }

    function clearCart() {
      cart = []; document.getElementById('payment-input').value = ""; renderCart();
    }

    // --- TRANSAKSI & PRINT RAWBT ---
    function processPayment() {
      const total = cart.reduce((s, i) => s + (i.price * i.qty), 0);
      const pay = parseInt(document.getElementById('payment-input').value) || 0;
      if(pay < total) return alert("Uang kurang!");

      const tx = {
        id: "TX" + Date.now(),
        date: new Date().toISOString(),
        branch: settings.branchName,
        items: [...cart],
        total, pay, change: pay - total
      };

      transactions.unshift(tx);
      localStorage.setItem('upos_v1_tx', JSON.stringify(transactions));
      printThermal(tx);
      alert("Berhasil!");
      clearCart();
    }

    function printThermal(tx) {
      const d = new Date(tx.date);
      let p = `${settings.storeName}\n${settings.branchName}\n${settings.storeAddress}\n`;
      p += `--------------------------------\n`;
      p += `ID: ${tx.id.slice(-8)}  ${d.toLocaleDateString()}\n`;
      p += `--------------------------------\n`;
      tx.items.forEach(i => {
        p += `${i.name.substring(0,20).padEnd(20)} x${i.qty}\n`;
        p += `${formatRupiah(i.price*i.qty).padStart(32)}\n`;
      });
      p += `--------------------------------\n`;
      p += `TOTAL   : ${formatRupiah(tx.total).padStart(22)}\n`;
      p += `BAYAR   : ${formatRupiah(tx.pay).padStart(22)}\n`;
      p += `KEMBALI : ${formatRupiah(tx.change).padStart(22)}\n`;
      p += `--------------------------------\n\n${settings.footer}\n\n\n\n`;

      window.location.href = `rawbt:base64,${btoa(p)}`;
    }

    // --- TABEL RIWAYAT ---
    function renderTransactionTable() {
      const tbody = document.getElementById('transaction-table-body');
      tbody.innerHTML = transactions.map(t => `
        <tr class="hover:bg-slate-50 transition">
          <td class="p-3">
            <div class="font-bold text-slate-700">${new Date(t.date).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>
            <div class="text-[9px] text-slate-400">${t.id.slice(-6)}</div>
          </td>
          <td class="p-3 text-slate-500 font-medium italic">${t.branch}</td>
          <td class="p-3 text-right font-bold mono text-indigo-600">${formatRupiah(t.total)}</td>
          <td class="p-3">
            <div class="flex justify-center gap-1">
              <button onclick='printThermal(${JSON.stringify(t)})' class="p-2 bg-indigo-50 text-indigo-600 rounded-lg">🖨️</button>
              <button onclick="deleteTx('${t.id}')" class="p-2 bg-rose-50 text-rose-600 rounded-lg">🗑️</button>
            </div>
          </td>
        </tr>
      `).join('');
    }

    function deleteTx(id) {
      if(confirm("Hapus transaksi ini?")) {
        transactions = transactions.filter(t => t.id !== id);
        localStorage.setItem('upos_v1_tx', JSON.stringify(transactions));
        renderTransactionTable();
      }
    }

    // --- KEUANGAN & BIAYA ---
    function addExpense() {
      const name = document.getElementById('expense-name').value;
      const amount = parseInt(document.getElementById('expense-amount').value);
      if(!name || !amount) return alert("Isi data biaya!");

      expenses.unshift({ id: Date.now(), name, amount, date: new Date().toISOString(), branch: settings.branchName });
      localStorage.setItem('upos_v1_expenses', JSON.stringify(expenses));
      document.getElementById('expense-name').value = "";
      document.getElementById('expense-amount').value = "";
      updateFinanceLaporan();
    }

    function updateFinanceLaporan() {
      const rev = transactions.reduce((s, t) => s + t.total, 0);
      const exp = expenses.reduce((s, e) => s + e.amount, 0);
      
      document.getElementById('pnl-revenue').textContent = formatRupiah(rev);
      document.getElementById('pnl-expense').textContent = formatRupiah(exp);
      document.getElementById('pnl-profit').textContent = formatRupiah(rev - exp);

      const tbody = document.getElementById('expense-table-body');
      tbody.innerHTML = expenses.map(e => `
        <tr class="text-slate-600">
          <td class="py-2 font-medium">${e.name} <span class="text-[8px] opacity-50 italic">(${e.branch})</span></td>
          <td class="py-2 text-right mono text-rose-500">-${formatRupiah(e.amount)}</td>
          <td class="py-2 text-right"><button onclick="deleteExp(${e.id})" class="text-red-400 font-bold ml-2">×</button></td>
        </tr>
      `).join('');
    }

    function deleteExp(id) {
      expenses = expenses.filter(e => e.id !== id);
      localStorage.setItem('upos_v1_expenses', JSON.stringify(expenses));
      updateFinanceLaporan();
    }

    // --- MANAJEMEN DATA & SINKRON (MERGING) ---
    function exportBackup() {
      const data = { settings, menuItems, transactions, expenses };
      const blob = new Blob([JSON.stringify(data)], {type:'application/json'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `POS_Backup_${settings.branchName}_${Date.now()}.json`;
      a.click();
    }

    function importAndMerge(event) {
      const file = event.target.files[0];
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const imported = JSON.parse(e.target.result);
          
          // Merge Transaksi (Hanya yang belum ada ID-nya)
          const currentTxIds = new Set(transactions.map(t => t.id));
          const newTxs = imported.transactions.filter(t => !currentTxIds.has(t.id));
          transactions = [...transactions, ...newTxs];
          
          // Merge Biaya (Kecuali jika owner ingin memisahkan, di sini kita gabung semua)
          const currentExpIds = new Set(expenses.map(ex => ex.id));
          const newExps = imported.expenses.filter(ex => !currentExpIds.has(ex.id));
          expenses = [...expenses, ...newExps];

          localStorage.setItem('upos_v1_tx', JSON.stringify(transactions));
          localStorage.setItem('upos_v1_expenses', JSON.stringify(expenses));
          
          alert(`Berhasil Menggabungkan:\n- ${newTxs.length} Transaksi Baru\n- ${newExps.length} Catatan Biaya Baru`);
          location.reload();
        } catch(err) { alert("File tidak valid!"); }
      };
      reader.readAsText(file);
    }

    // --- ADMIN MENU ---
    function renderAdminMenu() {
      const list = document.getElementById('admin-menu-list');
      list.innerHTML = menuItems.map(m => `
        <div class="flex justify-between items-center p-4">
          <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-lg flex items-center justify-center text-white font-bold text-[10px]" style="background-color: ${m.color}">${getInitials(m.name)}</div>
            <div><p class="text-xs font-bold">${m.name}</p><p class="text-[10px] text-indigo-500 font-bold">${formatRupiah(m.price)}</p></div>
          </div>
          <div class="flex gap-2 text-[10px] font-bold">
            <button onclick="editMenu(${m.id})" class="text-blue-600 bg-blue-50 px-2 py-1 rounded">Edit</button>
            <button onclick="deleteMenu(${m.id})" class="text-red-600 bg-red-50 px-2 py-1 rounded">Hapus</button>
          </div>
        </div>
      `).join('');
    }

    function openMenuModal() {
      document.getElementById('modal-title').textContent = "Produk Baru";
      document.getElementById('edit-id').value = "";
      document.getElementById('menu-name').value = "";
      document.getElementById('menu-price').value = "";
      document.getElementById('modal-menu').classList.remove('hidden');
    }

    function saveMenu() {
      const id = document.getElementById('edit-id').value;
      const name = document.getElementById('menu-name').value;
      const price = parseInt(document.getElementById('menu-price').value);
      const color = document.getElementById('menu-color').value;
      if(!name || !price) return;

      if(id) {
        const idx = menuItems.findIndex(m => m.id == id);
        menuItems[idx] = { ...menuItems[idx], name, price, color };
      } else {
        menuItems.push({ id: Date.now(), name, price, color });
      }
      localStorage.setItem('upos_v1_menu', JSON.stringify(menuItems));
      document.getElementById('modal-menu').classList.add('hidden');
      renderAdminMenu();
      renderMenuGrid();
    }

    function editMenu(id) {
      const m = menuItems.find(i => i.id == id);
      document.getElementById('modal-title').textContent = "Edit Produk";
      document.getElementById('edit-id').value = m.id;
      document.getElementById('menu-name').value = m.name;
      document.getElementById('menu-price').value = m.price;
      document.getElementById('menu-color').value = m.color;
      document.getElementById('modal-menu').classList.remove('hidden');
    }

    function deleteMenu(id) {
      if(confirm("Hapus produk?")) {
        menuItems = menuItems.filter(m => m.id != id);
        localStorage.setItem('upos_v1_menu', JSON.stringify(menuItems));
        renderAdminMenu();
      }
    }

    function closeMenuModal() { document.getElementById('modal-menu').classList.add('hidden'); }

    // --- PENGATURAN TOKO ---
    function openSettings() {
      document.getElementById('set-store-name').value = settings.storeName;
      document.getElementById('set-branch-name').value = settings.branchName;
      document.getElementById('set-store-address').value = settings.storeAddress;
      document.getElementById('modal-settings').classList.remove('hidden');
    }

    function saveSettings() {
      settings.storeName = document.getElementById('set-store-name').value;
      settings.branchName = document.getElementById('set-branch-name').value;
      settings.storeAddress = document.getElementById('set-store-address').value;
      localStorage.setItem('upos_v1_settings', JSON.stringify(settings));
      location.reload();
    }
    
    function closeSettings() { document.getElementById('modal-settings').classList.add('hidden'); }

    function resetAllData() {
      if(confirm("PERINGATAN: Semua data transaksi, biaya, dan menu akan dihapus permanen!")) {
        localStorage.clear(); location.reload();
      }
    }

    function exportToExcel() {
        const data = transactions.map(t => ({
            ID: t.id,
            Waktu: new Date(t.date).toLocaleString(),
            Cabang: t.branch,
            Total: t.total,
            Produk: t.items.map(i => `${i.name}(${i.qty})`).join(', ')
        }));
        const ws = XLSX.utils.json_to_sheet(data);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Riwayat");
        XLSX.writeFile(wb, `Laporan_${settings.branchName}.xlsx`);
    }

    function init() {
      document.getElementById('header-store-name').textContent = settings.storeName;
      document.getElementById('header-branch-info').textContent = settings.branchName + " | " + settings.storeAddress;
      const now = new Date();
      document.getElementById('current-date').textContent = now.toLocaleDateString('id-ID', {weekday:'long', day:'numeric', month:'short'});
      renderMenuGrid();
    }

    init();
  </script>
 </body>
</html>
